name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'


# github.com/01satria
jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # FIX: decode keystore to workspace root, set env var correctly
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV

      - name: Build Release APKs
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename and collect APKs
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="v${{ github.event.inputs.version_name }}"
          fi
          mkdir -p release_apks
          for apk in app/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] || continue
            filename=$(basename "$apk" .apk)
            # Extract ABI: app-arm64-v8a-release -> arm64-v8a, app-universal-release -> universal
            abi_part=$(echo "$filename" | sed -E 's/^app-//' | sed -E 's/-release$//')
            [ -z "$abi_part" ] && abi_part="universal"
            cp "$apk" "release_apks/MinimalLauncher-${VERSION}-${abi_part}.apk"
          done
          echo "=== Built APKs ==="
          ls -lh release_apks/

      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ github.run_number }}
          path: release_apks/*.apk
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Flow Minimal Launcher ${{ github.ref_name }}

            ### Pilih APK sesuai HP kamu / Choose the right APK for your device:
            | Berkas / File | Untuk / For |
            |---------------|-------------|
            | `*-arm64-v8a.apk` | ✅ **Rekomendasi / Recommended** — HP modern 64-bit / Modern 64-bit devices (2016+) |
            | `*-armeabi-v7a.apk` | HP lama 32-bit / Older 32-bit devices |
            | `*-x86_64.apk` | Emulator 64-bit |
            | `*-x86.apk` | Emulator 32-bit |
            | `*-universal.apk` | Semua perangkat (file lebih besar) / All devices (larger file size) |

            > **Catatan / Note:**
            > Tidak tahu pilih yang mana? Gunakan `arm64-v8a`. / Not sure which one to choose? Download `arm64-v8a`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/keystore.jks
