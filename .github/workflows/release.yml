name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Setup keystore dari secret ────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d ' \n\r' | base64 --decode > keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV



      # ── Build Release APK (split ABI) ─────────────────────────────────────
      - name: Build Release APKs
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Rename APK dengan versi ───────────────────────────────────────────
      - name: Rename APKs
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="v${{ github.event.inputs.version_name }}"
          fi
          
          mkdir -p release_apks
          
          for apk in app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk" .apk)
            cp "$apk" "release_apks/MinimalLauncher-${VERSION}-${filename##*-}.apk"
          done
          
          echo "APK files:"
          ls -lh release_apks/

      # ── Upload artifact (untuk workflow_dispatch) ─────────────────────────
      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release_apks/*.apk
          retention-days: 7

      # ── Buat GitHub Release (hanya jika trigger dari tag) ─────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release_apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Minimal Launcher ${{ github.ref_name }}
            
            ### APK Variants (pilih sesuai CPU device):
            | File | Target |
            |------|--------|
            | `*-arm64-v8a.apk` | **Rekomendasi** - HP modern (2016+) |
            | `*-armeabi-v7a.apk` | HP lama 32-bit |
            | `*-x86_64.apk` | Emulator 64-bit |
            | `*-x86.apk` | Emulator 32-bit |
            | `*-universal.apk` | Semua device (paling besar) |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup keystore ──────────────────────────────────────────────────
      - name: Clean up keystore
        if: always()
        run: rm -f keystore.jks
